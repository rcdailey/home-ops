---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flux Diff

on:
  pull_request:
    branches:
    - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter:
    name: Flux Diff - Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
    - name: Get Changed Files
      id: changed-files
      uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
      with:
        patterns: kubernetes/**/*

  test:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Flux Diff - Test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Setup flate
      uses: home-operations/flate/action@c2544f569380e766ef665abc7af685331c881117 # v0.4.11
      with:
        cache: true

    - name: Run flate test
      run: flate test all -p ./kubernetes/flux/cluster

  diff:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Flux Diff - Diff
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        resource:
        - hr
        - ks
      fail-fast: false
    steps:
    - name: Checkout
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Setup flate
      uses: home-operations/flate/action@c2544f569380e766ef665abc7af685331c881117 # v0.4.11
      with:
        cache: true

    - name: Run flate diff
      id: diff
      run: |-
        diff=$(flate diff ${{ matrix.resource }} -p ./kubernetes/flux/cluster \
          --output diff \
          --strip-attr helm.sh/chart \
          --strip-attr checksum/config \
          --strip-attr app.kubernetes.io/version \
          --strip-attr chart)
        echo 'diff<<EOF' >> "$GITHUB_OUTPUT"
        echo "$diff" >> "$GITHUB_OUTPUT"
        echo 'EOF' >> "$GITHUB_OUTPUT"

    - if: ${{ steps.diff.outputs.diff != '' }}
      name: Add Comment
      uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
      with:
        header: ${{ github.event.pull_request.number }}/kubernetes/${{ matrix.resource }}
        message: |-
          ```diff
          ${{ steps.diff.outputs.diff }}
          ```

  success:
    if: ${{ !cancelled() }}
    needs:
    - test
    - diff
    name: Flux Diff - Success
    runs-on: ubuntu-latest
    steps:
    - name: Any jobs failed?
      if: ${{ contains(needs.*.result, 'failure') }}
      run: exit 1

    - name: All jobs passed or skipped?
      if: ${{ !(contains(needs.*.result, 'failure')) }}
      run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"
