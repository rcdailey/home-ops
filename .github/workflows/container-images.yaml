# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
name: Container Images

on:
  push:
    branches: [main]
    paths:
    - containers/**
    - scripts/paperless/**
    - .github/workflows/container-images.yaml
  workflow_dispatch:
    inputs:
      image:
        description: Image directory name (e.g. paperless-classifier)
        required: false

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  discover:
    name: Discover
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      images: ${{ steps.images.outputs.images }}
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Determine images to build
      id: images
      env:
        INPUT_IMAGE: ${{ inputs.image }}
      run: |
        if [[ -n "$INPUT_IMAGE" ]]; then
          echo "images=[\"$INPUT_IMAGE\"]" >> "$GITHUB_OUTPUT"
        else
          images=$(find containers -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "images=$images" >> "$GITHUB_OUTPUT"
        fi

  build:
    name: Build (${{ matrix.image }})
    needs: discover
    if: ${{ needs.discover.outputs.images != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image: ${{ fromJson(needs.discover.outputs.images) }}
      fail-fast: false
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Login to GHCR
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Generate metadata
      id: meta
      uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
        tags: |
          type=sha,prefix=
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        context: containers/${{ matrix.image }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha,scope=${{ matrix.image }}
        cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  success:
    if: ${{ !cancelled() }}
    needs: [build]
    name: Success
    runs-on: ubuntu-latest
    permissions: {}
    steps:
    - name: Any jobs failed?
      if: ${{ contains(needs.*.result, 'failure') }}
      run: exit 1
    - name: All jobs passed or skipped?
      if: ${{ !(contains(needs.*.result, 'failure')) }}
      run: echo "All jobs passed or skipped"
