# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
name: Container Images

on:
  push:
    branches: [main]
    paths:
    - containers/**
    - scripts/paperless/**
    - .github/workflows/container-images.yaml
  workflow_dispatch:
    inputs:
      image:
        description: Image directory name (e.g. paperless-classifier)
        required: false

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  discover:
    name: Discover
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      images: ${{ steps.images.outputs.images }}
    steps:
    - name: Checkout
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        persist-credentials: false

    - name: Determine images to build
      id: images
      env:
        INPUT_IMAGE: ${{ inputs.image }}
      run: |
        if [[ -n "$INPUT_IMAGE" ]]; then
          echo "images=[\"$INPUT_IMAGE\"]" >> "$GITHUB_OUTPUT"
        else
          images=$(find containers -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "images=$images" >> "$GITHUB_OUTPUT"
        fi

  build:
    name: Build (${{ matrix.image }})
    needs: discover
    if: ${{ needs.discover.outputs.images != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image: ${{ fromJson(needs.discover.outputs.images) }}
      fail-fast: false
    steps:
    - name: Checkout
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        persist-credentials: false

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Login to GHCR
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Generate metadata
      id: meta
      uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
        tags: |
          type=sha,prefix=
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: containers/${{ matrix.image }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha,scope=${{ matrix.image }}
        cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  success:
    if: ${{ !cancelled() }}
    needs: [build]
    name: Success
    runs-on: ubuntu-latest
    permissions: {}
    steps:
    - name: Any jobs failed?
      if: ${{ contains(needs.*.result, 'failure') }}
      run: exit 1
    - name: All jobs passed or skipped?
      if: ${{ !(contains(needs.*.result, 'failure')) }}
      run: echo "All jobs passed or skipped"
