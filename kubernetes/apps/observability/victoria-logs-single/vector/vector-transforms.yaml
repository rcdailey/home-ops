---
data_dir: /vector-data-dir
api:
  enabled: false
  address: 0.0.0.0:8686
  playground: true

# Release metric memory for components that churn labels
expire_metrics_secs: 600

transforms:
  # Route Ceph daemon logs (mon/mgr/osd) to the Ceph-specific parser.
  # Everything else falls through to the default parser.
  ceph_filter:
    type: filter
    inputs: [k8s]
    condition:
      type: vrl
      source: |
        exists(.kubernetes.pod_labels.ceph_daemon_type) ||
          starts_with(string(.kubernetes.pod_labels."app.kubernetes.io/name") ?? "", "rook-ceph")

  ceph_parser:
    type: remap
    inputs: [ceph_filter]
    file: /etc/vector/parse-ceph.vrl

  # Drop Rook operator admin-socket polling noise. Ceph's LogChannel emits
  # a dout trace at level 0 every time an audit entry is dispatched, before
  # the channel threshold check runs. This means mon_cluster_log_level
  # cannot silence these lines; they bypass it by design (see Ceph
  # src/common/LogClient.cc). The traces carry no investigation value;
  # they just prove Rook is polling mon_status / osd dump / mgr stat /
  # fs dump on the usual reconcile loop.
  ceph_noise_filter:
    type: filter
    inputs: [ceph_parser]
    condition:
      type: vrl
      source: |
        msg = string(.message) ?? ""
        !contains(msg, "log_channel(audit) log [DBG]")

  # Enrich Talos events with node identity. The socket source has no
  # built-in node enrichment, so we inject spec.nodeName via env var
  # (expanded at Vector startup, constant per DaemonSet pod).
  talos_enrich:
    type: remap
    inputs: [talos]
    source: '.node = "$${VECTOR_NODE_NAME}"'

  talos_parser:
    type: remap
    inputs: [talos_enrich]
    file: /etc/vector/parse-talos.vrl

  # Drop Talos machined gRPC access logs generated by Prometheus metric
  # scraping. These are "authorized" and "OK [/machine.MachineService/...]"
  # lines emitted every few seconds per node (~1.2k/min cluster-wide).
  # Routine scrape confirmations with no investigation value; etcd health
  # check failures and kernel messages use different patterns and pass
  # through.
  talos_noise_filter:
    type: filter
    inputs: [talos_parser]
    condition:
      type: vrl
      source: |
        .app != "machined" ||
          !match!(string!(.message), r'^machined (OK \[/machine\.MachineService/|/authz/authorizer authorized)')

  # Default fallback for any opt-in pod that isn't Ceph.
  default_filter:
    type: filter
    inputs: [k8s]
    condition:
      type: vrl
      source: |
        !(exists(.kubernetes.pod_labels.ceph_daemon_type) ||
          starts_with(string(.kubernetes.pod_labels."app.kubernetes.io/name") ?? "", "rook-ceph"))

  default_parser:
    type: remap
    inputs: [default_filter]
    file: /etc/vector/parse-default.vrl
