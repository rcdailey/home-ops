---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs-single
spec:
  interval: 30m
  timeout: 20m
  chartRef:
    kind: OCIRepository
    name: victoria-logs-single
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    disableWait: true # Don't wait for resources - prevents deadlock when DaemonSet can't start
    remediation:
      retries: 3
  # WHY: The wrapper chart passes podHostNetwork to the Vector subchart but not
  # dnsPolicy. Without ClusterFirstWithHostNet, hostNetwork pods use the node's
  # DNS resolver and can't reach cluster service names (breaks the vlogs sink).
  # Upstream: https://github.com/VictoriaMetrics/helm-charts/issues/2800
  postRenderers:
  - kustomize:
      patches:
      - target:
          kind: DaemonSet
          name: victoria-logs-single-vector
        patch: |
          - op: add
            path: /spec/template/spec/dnsPolicy
            value: ClusterFirstWithHostNet
  values:
    server:
      enabled: true
      # Override the service name to match expected naming convention
      fullnameOverride: "victoria-logs-single"
      retentionPeriod: 14

      # Reloader annotation to restart pod when ConfigMap changes
      podAnnotations:
        reloader.stakater.com/auto: "true"
      extraArgs:
        envflag.enable: true
        envflag.prefix: VM_
        loggerFormat: json
        httpListenAddr: :9428
        http.shutdownDelay: 15s

      persistentVolume:
        enabled: true
        # OpenEBS hostPath provisioner for ephemeral log storage
        # WHY: Avoid Ceph write amplification from continuous log writes
        storageClassName: openebs-hostpath
        accessModes:
        - ReadWriteOnce
        size: 25Gi
        mountPath: /storage

      # Pin to non-controlplane nodes only (avoid controlplane etcd contention)
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist

      resources:
        limits:
          memory: 1Gi
        requests:
          cpu: 50m
          memory: 256Mi

      service:
        type: ClusterIP
        servicePort: 9428
        targetPort: http

      # Security context
      securityContext:
        enabled: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
          - ALL
        readOnlyRootFilesystem: true

      podSecurityContext:
        enabled: true
        fsGroup: 2000
        runAsNonRoot: true
        runAsUser: 1000

    # Vector DaemonSet with label-gated opt-in collection.
    # Only pods carrying observability.home-ops/logs=true are watched; filtering
    # happens at the apiserver watch level via extra_label_selector in the
    # kubernetes_logs source, so unlabeled pods are never listed or tailed.
    # Config and VRL files come from two Kustomize-generated ConfigMaps
    # (see kustomization.yaml). Both are projected into /etc/vector/ by the
    # chart; Vector's --config-dir ignores non-YAML files, so .vrl files sit
    # alongside YAML config safely.
    vector:
      enabled: true
      existingConfigMaps:
      - victoria-logs-vector-config
      - victoria-logs-vector-vrl
      # hostNetwork lets Talos reach the socket source at localhost:6170.
      # Each node's machined and kmsg forwarder push JSON Lines to this port.
      podHostNetwork: true
      containerPorts:
      - name: prom-exporter
        containerPort: 9090
        protocol: TCP
      - name: talos-logs
        containerPort: 6170
        protocol: TCP
      env:
      - name: VECTOR_NODE_NAME
        valueFrom:
          fieldRef:
            fieldPath: spec.nodeName
      podAnnotations:
        reloader.stakater.com/auto: "true"
      resources:
        limits:
          # Steady-state usage is ~20Mi but Vector hits a startup hump on
          # mon-hosting nodes while catching up on checkpointed backlog and
          # opening file watchers. 512Mi was not enough to absorb the spike;
          # 1Gi covers it with headroom. Memory limits cap, not reserve, so
          # the extra ceiling costs nothing during steady state.
          memory: 1Gi
        requests:
          cpu: 20m
          memory: 128Mi

    # Service monitor for metrics
    serviceMonitor:
      enabled: true
      extraLabels: {}
      annotations: {}
      targetPort: http
