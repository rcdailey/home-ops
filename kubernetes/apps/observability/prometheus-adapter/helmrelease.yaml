---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/ocirepository-source-v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: prometheus-adapter
spec:
  interval: 15m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 5.3.0
  url: oci://ghcr.io/prometheus-community/charts/prometheus-adapter
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-adapter
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: prometheus-adapter
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    prometheus:
      url: http://vmsingle-victoria-metrics-k8s-stack.observability
      port: 8428
    rules:
      default: false
      external:
      - seriesQuery: '{__name__="probe_success"}'
        resources:
          namespaced: false
        name:
          as: probe_success
        metricsQuery: max_over_time(<<.Series>>{<<.LabelMatchers>>}[1m])
