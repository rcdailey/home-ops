---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization.json
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ./externalsecret.yaml
- ./httproute.yaml
- ./grafana.yaml
- ./grafanadatasource.yaml
- ./dashboards/grafanadashboard.yaml
configMapGenerator:
- name: container-memory-usage-dashboard
  files:
  - container-memory-usage.json=dashboards/container-memory-usage.json
  options:
    disableNameSuffixHash: true
    labels:
      app.kubernetes.io/managed-by: grafana-operator
    annotations:
      kustomize.toolkit.fluxcd.io/substitute: disabled
- name: ceph-etcd-incident-overview-dashboard
  files:
  - ceph-etcd-incident-overview.json=dashboards/ceph-etcd-incident-overview.json
  options:
    disableNameSuffixHash: true
    labels:
      app.kubernetes.io/managed-by: grafana-operator
    annotations:
      kustomize.toolkit.fluxcd.io/substitute: disabled
- name: etcd-dashboard
  files:
  - etcd.json=dashboards/etcd.json
  options:
    disableNameSuffixHash: true
    labels:
      app.kubernetes.io/managed-by: grafana-operator
    annotations:
      kustomize.toolkit.fluxcd.io/substitute: disabled
