---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app claude-proxy
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      claude-proxy:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/eceasy/cli-proxy-api
              tag: v7.1.19
            command: ["/CLIProxyAPI/CLIProxyAPI", "--config", "/config/config.yaml"]
            env:
              MANAGEMENT_STATIC_PATH: /tmp/static
            envFrom:
            - secretRef:
                name: claude-proxy-secret

            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: &port 8317

            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                - ALL

        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: *app
        ports:
          http:
            port: *port

    route:
      app:
        hostnames:
        - ai-proxy.${SECRET_DOMAIN}
        parentRefs:
        - name: internal
          namespace: network
          sectionName: https
        rules:
        - backendRefs:
          - identifier: app
            port: http

    persistence:
      config:
        type: configMap
        name: claude-proxy-config
        advancedMounts:
          claude-proxy:
            app:
            - path: /config
              readOnly: true

      data:
        existingClaim: *app
        advancedMounts:
          claude-proxy:
            app:
            - path: /data

      tmp:
        type: emptyDir
        advancedMounts:
          claude-proxy:
            app:
            - path: /tmp
