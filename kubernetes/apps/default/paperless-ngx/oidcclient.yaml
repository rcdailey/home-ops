# yaml-language-server: $schema=https://raw.githubusercontent.com/aclerici38/pocket-id-operator/refs/heads/main/dist/schemas/pocketidoidcclient_v1alpha1.json
---
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDOIDCClient
metadata:
  name: paperless-ngx
spec:
  name: Paperless-ngx
  clientID: paperless-ngx
  skipConsent: true
  launchUrl: https://docs.${SECRET_DOMAIN}
  callbackUrls:
  - https://docs.${SECRET_DOMAIN}/accounts/oidc/pocket-id/login/callback/
  logoutCallbackUrls:
  - https://docs.${SECRET_DOMAIN}
  secret:
    keys:
      clientSecret: client-secret
