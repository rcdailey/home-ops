---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app bentopdf
spec:
  targetNamespace: default
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  path: ./kubernetes/apps/default/bentopdf
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  postBuild:
    substitute:
      APP: bentopdf
      SUBDOMAIN: pdf
      HTTPROUTE_NAME: bentopdf
      APP_ICON_URL: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons@main/svg/bentopdf.svg
    substituteFrom:
    - kind: Secret
      name: cluster-secrets
  dependsOn:
  - name: global-config
    namespace: flux-system
  - name: pocket-id-operator
