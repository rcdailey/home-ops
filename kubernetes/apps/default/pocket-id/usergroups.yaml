# yaml-language-server: $schema=https://raw.githubusercontent.com/aclerici38/pocket-id-operator/refs/heads/main/dist/schemas/pocketidusergroup_v1alpha1.json
---
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDUserGroup
metadata:
  name: admins
spec:
  friendlyName: Admins
  customClaims:
  - key: oc_groups
    value: admins
---
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDUserGroup
metadata:
  name: users
spec:
  friendlyName: Users
  customClaims:
  - key: oc_groups
    value: users
---
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDUserGroup
metadata:
  name: guest
spec:
  friendlyName: Guest
  customClaims:
  - key: oc_groups
    value: guest
