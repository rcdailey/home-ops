# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/admissionregistration.k8s.io/mutatingadmissionpolicy_v1beta1.json
---
# Logging configuration for volsync/kopia mover pods
# - Disables file logging via --disable-file-logging flag
# - Sets debug log level for verbose stdout (flows to VictoriaLogs)
# Note: /logs volume is provided by the image natively
apiVersion: admissionregistration.k8s.io/v1beta1
kind: MutatingAdmissionPolicyBinding
metadata:
  name: volsync-mover-logging
spec:
  policyName: volsync-mover-logging
---
apiVersion: admissionregistration.k8s.io/v1beta1
kind: MutatingAdmissionPolicy
metadata:
  name: volsync-mover-logging
spec:
  matchConstraints:
    resourceRules:
    - apiGroups:
      - batch
      apiVersions:
      - v1
      operations:
      - CREATE
      - UPDATE
      resources:
      - jobs
  matchConditions:
  - name: has-volsync-job-name-prefix
    expression: object.metadata.name.startsWith("volsync-") || object.metadata.name.startsWith("kopia-maint-")
  - name: has-volsync-created-by-labels
    expression: |
      object.metadata.?labels["app.kubernetes.io/created-by"].orValue("") == "volsync" ||
      object.metadata.?labels["volsync.backube/kopia-maintenance"].orValue("") == "true"
  failurePolicy: Fail
  reinvocationPolicy: IfNeeded
  mutations:
  - patchType: JSONPatch
    jsonPatch:
      expression: |
        [
          JSONPatch{
            op: "add", path: "/spec/template/spec/containers/0/env",
            value: []
          },
          JSONPatch{
            op: "add", path: "/spec/template/spec/containers/0/env/-",
            value: Object.spec.template.spec.containers.env{
              name: "KOPIA_LOG_LEVEL",
              value: "debug"
            }
          },
          JSONPatch{
            op: "add", path: "/spec/template/spec/containers/0/env/-",
            value: Object.spec.template.spec.containers.env{
              name: "KOPIA_ADDITIONAL_ARGS",
              value: "--disable-file-logging"
            }
          }
        ]
---
apiVersion: admissionregistration.k8s.io/v1beta1
kind: MutatingAdmissionPolicyBinding
metadata:
  name: volsync-mover-jitter
spec:
  policyName: volsync-mover-jitter
---
apiVersion: admissionregistration.k8s.io/v1beta1
kind: MutatingAdmissionPolicy
metadata:
  name: volsync-mover-jitter
spec:
  matchConstraints:
    resourceRules:
    - apiGroups:
      - batch
      apiVersions:
      - v1
      operations:
      - CREATE
      - UPDATE
      resources:
      - jobs
  matchConditions:
  - name: has-volsync-job-name-prefix
    expression: object.metadata.name.startsWith("volsync-src-")
  - name: has-volsync-created-by-labels
    expression: object.metadata.?labels["app.kubernetes.io/created-by"].orValue("") == "volsync"
  failurePolicy: Fail
  reinvocationPolicy: IfNeeded
  mutations:
  - patchType: JSONPatch
    jsonPatch:
      expression: |
        [
          JSONPatch{
            op: "add", path: "/spec/template/spec/initContainers",
            value: []
          },
          JSONPatch{
            op: "add", path: "/spec/template/spec/initContainers/-",
            value: Object.spec.template.spec.initContainers{
              name: "jitter",
              image: "ghcr.io/home-operations/busybox:1.37.0@sha256:026ed7273270ec08f6902b4ae8334c23b473e5394bec3bbbdbfe580c710d50bc",
              imagePullPolicy: "IfNotPresent",
              command: ["sh", "-c", "sleep $(shuf -i 0-30 -n 1)"]
            }
          }
        ]
---
apiVersion: admissionregistration.k8s.io/v1beta1
kind: MutatingAdmissionPolicyBinding
metadata:
  name: volsync-mover-nfs
spec:
  policyName: volsync-mover-nfs
---
apiVersion: admissionregistration.k8s.io/v1beta1
kind: MutatingAdmissionPolicy
metadata:
  name: volsync-mover-nfs
spec:
  matchConstraints:
    resourceRules:
    - apiGroups:
      - batch
      apiVersions:
      - v1
      operations:
      - CREATE
      - UPDATE
      resources:
      - jobs
  matchConditions:
  - name: has-volsync-job-name-prefix
    expression: object.metadata.name.startsWith("volsync-")
  - name: has-volsync-created-by-labels
    expression: object.metadata.?labels["app.kubernetes.io/created-by"].orValue("") == "volsync"
  - name: repository-volume-does-not-exist
    expression: |
      !has(object.spec.template.spec.volumes) ||
      !object.spec.template.spec.volumes.exists(item, item.name == "repository")
  failurePolicy: Fail
  reinvocationPolicy: IfNeeded
  mutations:
  - patchType: JSONPatch
    jsonPatch:
      expression: |
        [
          JSONPatch{
            op: "add", path: "/spec/template/spec/volumes/-",
            value: Object.spec.template.spec.volumes{
              name: "repository",
              nfs: Object.spec.template.spec.volumes.nfs{
                server: "192.168.1.58",
                path: "/mnt/user/volsync",
                readOnly: false
              }
            }
          },
          JSONPatch{
            op: "add", path: "/spec/template/spec/containers/0/volumeMounts/-",
            value: Object.spec.template.spec.containers.volumeMounts{
              name: "repository",
              mountPath: "/repository",
              readOnly: false
            }
          }
        ]
---
