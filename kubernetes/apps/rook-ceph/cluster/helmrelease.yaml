---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: rook-ceph-cluster
    namespace: rook-ceph
  dependsOn:
  - name: rook-ceph-operator
    namespace: rook-ceph
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # Rook Ceph Cluster Configuration
    # 3-node cluster with device selectors for each node
    monitoring:
      enabled: true
      createPrometheusRules: true
      prometheusRuleOverrides:
        # CRITICAL: Disable CephNodeNetworkPacketDrops alert for Intel NIC false positives
        # Intel NUCs (nami, marin) with bond0 interfaces show benign receive packet drops
        # due to hardware checksum offloading dropping invalid packets (multicast/broadcast noise)
        # Ceph cluster remains HEALTH_OK, indicating no operational impact
        # See: Intel I219/I225 NICs commonly drop packets with checksum offload enabled
        CephNodeNetworkPacketDrops:
          disabled: true
        # Disable PrometheusJobMissing alert - rook-ceph namespace excluded from VMAgent scraping
        # Metrics collection intentionally disabled to avoid overwhelming observability stack
        PrometheusJobMissing:
          disabled: true
        # Disable predict_linear disk space alert - generates false positives during image pulls
        # Replaced with threshold-based NodeDiskSpaceLow/Critical alerts in observability vmrule
        CephNodeDiskspaceWarning:
          disabled: true
        # Relax PG imbalance threshold for mixed-size OSDs (2x 1.8TiB + 3x 932GiB)
        # Larger OSDs receive proportionally more PGs by design; default 30% fires constantly
        CephPGImbalance:
          expr: |
            abs(
              ((ceph_osd_numpg > 0) - on (job) group_left avg(ceph_osd_numpg > 0) by (job)) /
              on (job) group_left avg(ceph_osd_numpg > 0) by (job)
            ) * on (ceph_daemon) group_left(hostname) ceph_osd_metadata > 0.50

    ingress:
      dashboard:
        enabled: false

    toolbox:
      enabled: true

    cephClusterSpec:
      # Recovery/backfill tuning for NVMe OSDs (Samsung 990 PRO/970 EVO Plus)
      # Aggressive settings to prevent backfill_wait queue buildup and slow ops
      # Default osd_recovery_max_active=1 causes cascading delays with client I/O
      # Reference: https://docs.ceph.com/en/latest/rados/configuration/osd-config-ref/
      cephConfig:
        global:
          # Enable mClock override to allow custom recovery tuning for NVMe OSDs
          # Required because mClock scheduler gates osd_max_backfills/osd_recovery_max_active
          # Without this, aggressive recovery settings are ignored, causing queue buildup
          osd_mclock_override_recovery_settings: "true"
          # Backfill/recovery parallelism - balance speed vs client I/O impact
          osd_max_backfills: "3"
          osd_recovery_max_active: "12"
          # Small sleep prevents recovery from monopolizing OSD threads
          osd_recovery_sleep_ssd: "0.025"
          # Lower priority vs client I/O (default=3, client ops default to 63)
          osd_recovery_op_priority: "2"
          # Raise cluster/audit log channel threshold from default "debug" so
          # mon stderr stops emitting pgmap DBG and admin-socket audit DBG
          # spam. Governs both "cluster" and "audit" channels with a single
          # knob (Ceph v19 Squid removed the per-channel level options).
          # Keeps [INF] health transitions and election events, which are the
          # signal the ceph-mon-quorum-loss investigation cares about.
          # Ref: https://docs.ceph.com/en/latest/rados/troubleshooting/log-and-debug/#monitors
          mon_cluster_log_level: info
          # Quiet rocksdb compaction/file-deletion chatter from mon stderr.
          # Default is 4/5 which emits every sst file delete event from the
          # mon's store.db. Drop output level to 1 (keep memory ring at 5
          # for post-crash dumps). Compaction progress is not useful for
          # mon quorum incident analysis.
          debug_rocksdb: 1/5
          # Always-on debug levels for post-incident analysis of mon quorum
          # and paxos issues. Level 1 emits minimal disk output; level 5 fills
          # the in-memory ring buffer which gets dumped on crash/assertion.
          # Runtime toggle for active incidents:
          #   ceph tell mon.* config set debug_paxos 10/20
          #   ceph tell mon.* config set debug_ms 5/10
          #   (revert after window closes)
          debug_mon: 1/5
          debug_paxos: 1/5
          # Messenger at 0/5: verbosity 1 generates ~5k lines/min of paxos
          # lease, mgr beacon, and route-forwarding chatter that writes to
          # the Talos system disk via containerd log capture. Counterproductive
          # when investigating write contention. Level 0 still emits state
          # changes and connection errors; level 5 ring buffer preserves
          # detail for crash dumps.
          debug_ms: 0/5
          # Disable the LogMonitor's cluster-log stderr forwarder. Rook
          # starts mon daemons with --default-mon-cluster-log-to-stderr=true
          # (see rook/pkg/operator/ceph/config/defaults.go), which causes
          # every cluster/audit channel entry to be written to stderr a
          # second time in the "cluster <ts> mon.X ..." / "audit <ts> ..."
          # format, on top of the dout trace ("debug <ts> ... log_channel(X)
          # log [Y] : ...") that log_to_stderr already emits. Roughly 20%
          # of mon stderr lines were exact consecutive duplicates of this
          # forwarder output. Disabling it at the central config store
          # overrides Rook's --default- cmdline flag and leaves the dout
          # stream as the single source of truth, which is also the only
          # format our VRL parser matches. Rook's mon health check uses
          # `ceph status` + admin socket, not log scraping, so removing the
          # forwarder output has no operator-side impact. Upstream cephadm
          # recommends the same setting when file logging is enabled.
          # Ref: ceph/doc/cephadm/operations.rst ("logged twice")
          mon_cluster_log_to_stderr: "false"
      cleanupPolicy:
        wipeDevicesFromOtherClusters: false
      # Opt mon pods into Vector log collection via label gate.
      # See kubernetes/apps/observability/victoria-logs-single/ for the
      # collector config. Only mon daemons are labeled for now; extend to
      # mgr/osd later if the incident signal requires it.
      labels:
        mon:
          observability.home-ops/logs: "true"
      mon:
        count: 3
        allowMultiplePerNode: false
      mgr:
        count: 2
        allowMultiplePerNode: false
      dashboard:
        enabled: true
        ssl: false
      crashCollector:
        disable: false
      storage:
        useAllNodes: false
        useAllDevices: false
        nodes:
        - name: "lucy"
          devicePathFilter: "/dev/disk/by-id/nvme-CT2000P3PSSD8_2510E9ACCA3D"
          config:
            deviceClass: "ssd"
            metadataDevice: ""
            osdsPerDevice: "1"
        - name: "nami"
          devicePathFilter: "/dev/disk/by-id/nvme-Samsung_SSD_990_PRO_2TB_S7L9NJ0Y903689D"
          config:
            deviceClass: "ssd"
            metadataDevice: ""
            osdsPerDevice: "1"
        - name: "marin"
          devicePathFilter: "/dev/disk/by-id/nvme-Samsung_SSD_970_EVO_Plus_1TB_S6S1NJ0TB03807K"
          config:
            deviceClass: "ssd"
            metadataDevice: ""
            osdsPerDevice: "1"
        - name: "sakura"
          devicePathFilter: "/dev/disk/by-id/nvme-Samsung_SSD_970_EVO_Plus_1TB_S6S1NS0W223961P"
          config:
            deviceClass: "ssd"
            metadataDevice: ""
            osdsPerDevice: "1"
        - name: "hanekawa"
          devicePathFilter: "/dev/disk/by-id/nvme-Samsung_SSD_970_EVO_Plus_1TB_S6S1NS0W224436E"
          config:
            deviceClass: "ssd"
            metadataDevice: ""
            osdsPerDevice: "1"
      # Resource limits - prevent memory pressure
      # MGR: peaked at 928Mi with 1Gi limit (90% alert threshold)
      # MGR-sidecar: spiked to 93Mi of 100Mi default (only exists when mgr.count: 2)
      # OSD: observed using 1.7GB during backfill operations
      resources:
        mgr:
          limits:
            memory: 2Gi
        mgr-sidecar:
          limits:
            memory: 200Mi
        osd:
          limits:
            memory: 8Gi

    # Storage classes configuration - using defaults
    cephBlockPools:
    - name: ceph-blockpool
      spec:
        failureDomain: host
        replicated:
          size: 3
          requireSafeReplicaSize: true
      storageClass:
        enabled: true
        name: ceph-block
        isDefault: true
        reclaimPolicy: Delete
        allowVolumeExpansion: true
        volumeBindingMode: Immediate
        parameters:
          imageFormat: "2"
          imageFeatures: layering
          csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
          csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
          csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
          csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
          csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
          csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
          csi.storage.k8s.io/fstype: ext4
    cephBlockPoolsVolumeSnapshotClass:
      enabled: true
      name: csi-ceph-blockpool
      isDefault: false
      deletionPolicy: Delete

    cephFileSystems:
    - name: ceph-filesystem
      spec:
        metadataPool:
          replicated:
            size: 3
        dataPools:
        - name: data0
          failureDomain: host
          replicated:
            size: 3
        metadataServer:
          activeCount: 1
          activeStandby: true
      storageClass:
        enabled: true
        name: ceph-filesystem
        pool: data0
        reclaimPolicy: Delete
        allowVolumeExpansion: true
        volumeBindingMode: Immediate
        parameters:
          csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
          csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
          csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
          csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
          csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
          csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
          csi.storage.k8s.io/fstype: ext4
    cephFileSystemVolumeSnapshotClass:
      enabled: true
      name: csi-ceph-filesystem
      isDefault: false
      deletionPolicy: Delete

    # RGW (S3) disabled - using external Garage S3 on nezuko instead
    cephObjectStores: []
