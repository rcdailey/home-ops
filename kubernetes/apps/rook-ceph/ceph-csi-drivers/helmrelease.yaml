---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-csi-drivers
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: ceph-csi-drivers
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  # Required by Rook v1.20.0: CSI driver ServiceAccounts and RBAC are now
  # managed by the ceph-csi-drivers chart instead of the rook-ceph operator.
  # Driver names must match the existing Driver CRs created by Rook.
  # See rook/rook#17644 for context on missing SA issue during upgrade.
  values:
    drivers:
      rbd:
        name: rook-ceph.rbd.csi.ceph.com
        snapshotPolicy: volumeSnapshot
      cephfs:
        name: rook-ceph.cephfs.csi.ceph.com
        snapshotPolicy: volumeGroupSnapshot
      nfs:
        enabled: false
      nvmeof:
        enabled: false
