---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/gateway.envoyproxy.io/envoyproxy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: cluster-traffic-policy
  namespace: network
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 2
      envoyService:
        patch:
          type: StrategicMerge
          value:
            spec:
              # With BGP, Cilium only advertises VIPs from nodes that host the
              # backing pod. Local ensures traffic is delivered directly without
              # cross-node forwarding or SNAT. DSR (cluster-wide) complements
              # this by sending replies directly to the client.
              externalTrafficPolicy: Local
