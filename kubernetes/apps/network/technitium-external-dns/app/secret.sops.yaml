---
# yaml-language-server: $schema=https://kubernetesjsonschema.dev/v1.18.1-standalone-strict/secret-v1.json
apiVersion: v1
kind: Secret
metadata:
  name: technitium-external-dns-secret
stringData:
  # TSIG key generated from Technitium DNS Server web UI
  # Settings → TSIG → Create New Key
  # Algorithm: HMAC-SHA256, Key Name: external-dns-key
  tsig-secret: PLACEHOLDER_TSIG_SECRET_WILL_BE_SET_AFTER_TECHNITIUM_CONFIGURATION # pragma: allowlist secret
