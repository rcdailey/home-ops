---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization.json
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
components:
- ../../../components/nfs-scaler
- ../../../components/volsync
resources:
- ./helmrelease.yaml
- ./pvc.yaml
- ./externalsecret.yaml
configMapGenerator:
- name: qbittorrent-scripts
  files:
  - port-forward-up.sh=./config/port-forward-up.sh
  - port-forward-down.sh=./config/port-forward-down.sh
generatorOptions:
  disableNameSuffixHash: true
