---
# yaml-language-server: $schema=https://kubernetesjsonschema.dev/v1.14.0/service-v1.json
apiVersion: v1
kind: Service
metadata:
  name: dns-gateway
  namespace: dns-private
  labels:
    app.kubernetes.io/component: proxy
  annotations:
    lbipam.cilium.io/ips: 192.168.50.71
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app.kubernetes.io/component: dns-server
    app.kubernetes.io/controller: blocky
  ports:
  - name: dns-tcp
    port: 53
    protocol: TCP
    targetPort: 5353
  - name: dns-udp
    port: 53
    protocol: UDP
    targetPort: 5353
