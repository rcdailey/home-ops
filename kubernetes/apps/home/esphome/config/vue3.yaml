---
esphome:
  name: emporiavue3
  min_version: "2026.3.0"

# Migrated from digiblur/esphome-vue3 (stale since March 2024) to the
# actively maintained upstream. PR #362 added variant support for Vue 3.
external_components:
- source: github://emporia-vue-local/esphome@dev
  components:
  - emporia_vue

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    version: recommended
    advanced:
      minimum_chip_revision: "3.1"

preferences:
  # the default of 1min is far too short--flash chip is rated
  # for approx 100k writes.
  flash_write_interval: "48h"

api:
ota:
  platform: esphome

logger:
  logs:
    sensor: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: 192.168.2.192
  ap:

captive_portal:

# Vue 3 uses GPIO 5/18 (Vue 2 uses 21/22).
# 400kHz + 1ms timeout per upstream PR #317 and ESPHome 2024.10+ requirements.
i2c:
  sda:
    number: 5
    ignore_strapping_warning: true
  scl: 18
  scan: false
  frequency: 400kHz
  timeout: 1ms
  id: i2c_a

switch:
- platform: restart
  name: Restart

time:
- platform: homeassistant
  id: ha_time

# Two-tier filter strategy (per upstream recommendation):
#   Raw power sensors are internal with only *pos -- no smoothing -- so
#   total_daily_energy integrates against accurate readings.
#   Copy sensors apply *throttle_avg for smoothed display in HA.
#   Daily energy sensors apply *throttle_time to reduce DB writes.
.filters:
- &moving_avg
  sliding_window_moving_average:
    window_size: 24
    send_every: 12
- &pos
  lambda: 'return max(x, 0.0f);'
- &throttle_avg
  throttle_average: 5s
- &throttle_time
  throttle: 60s
.daily_energy: &daily_energy
  platform: total_daily_energy
  accuracy_decimals: 0
  restore: false
  filters: [*throttle_time]

sensor:
# ---- Raw power sensors (internal, not published to HA) ----
- platform: emporia_vue
  variant: vue3
  i2c_id: i2c_a
  phases:
  - id: phase_a
    input: RED
    calibration: 0.0189
    voltage:
      name: "Phase A Voltage"
      filters: [*moving_avg, *pos]
  - id: phase_b
    input: BLACK
    calibration: 0.0189
    voltage:
      name: "Phase B Voltage"
      filters: [*moving_avg, *pos]
  ct_clamps:
  - phase_id: phase_a
    input: "A"
    power:
      id: phase_a_power
      filters: [*pos]
  - phase_id: phase_b
    input: "B"
    power:
      id: phase_b_power
      filters: [*pos]
  - {phase_id: phase_a, input: "1", power: {id: cir1, filters: [*pos]}}
  - {phase_id: phase_b, input: "2", power: {id: cir2, filters: [*pos]}}
  - {phase_id: phase_a, input: "3", power: {id: cir3, filters: [*pos, {multiply: 2}]}}
  - {phase_id: phase_a, input: "4", power: {id: cir4, filters: [*pos, {multiply: 2}]}}
  - {phase_id: phase_b, input: "5", power: {id: cir5, filters: [*pos, {multiply: 2}]}}
  - {phase_id: phase_b, input: "6", power: {id: cir6, filters: [*pos, {multiply: 2}]}}
  - {phase_id: phase_b, input: "7", power: {id: cir7, filters: [*pos]}}
  - {phase_id: phase_b, input: "8", power: {id: cir8, filters: [*pos]}}
  - {phase_id: phase_a, input: "9", power: {id: cir9, filters: [*pos]}}
  - {phase_id: phase_b, input: "10", power: {id: cir10, filters: [*pos]}}
  - {phase_id: phase_a, input: "11", power: {id: cir11, filters: [*pos]}}
  - {phase_id: phase_b, input: "12", power: {id: cir12, filters: [*pos]}}
  - {phase_id: phase_b, input: "13", power: {id: cir13, filters: [*pos]}}
  - {phase_id: phase_a, input: "14", power: {id: cir14, filters: [*pos]}}
  #- {phase_id: phase_b, input: "15", power: {id: cir15, filters: [*pos]}}
  #- {phase_id: phase_a, input: "16", power: {id: cir16, filters: [*pos]}}
  on_update:
    then:
    - component.update: total_power
    - component.update: balance_power

# ---- Template sensors (internal, recalculated on every CT update) ----
- platform: template
  id: total_power
  lambda: return id(phase_a_power).state + id(phase_b_power).state;
  update_interval: never
  unit_of_measurement: "W"
  device_class: power
  state_class: measurement
- platform: template
  id: balance_power
  lambda: |-
    return max(0.0f, id(total_power).state
      - id(cir1).state - id(cir2).state - id(cir3).state - id(cir4).state
      - id(cir5).state - id(cir6).state - id(cir7).state - id(cir8).state
      - id(cir9).state - id(cir10).state - id(cir11).state - id(cir12).state
      - id(cir13).state - id(cir14).state);
  update_interval: never
  unit_of_measurement: "W"
  device_class: power
  state_class: measurement

# ---- Copy sensors (published to HA with throttled averaging) ----
- {platform: copy, name: "Phase A Power", source_id: phase_a_power, filters: [*throttle_avg]}
- {platform: copy, name: "Phase B Power", source_id: phase_b_power, filters: [*throttle_avg]}
- {platform: copy, name: "Total Power", source_id: total_power, filters: [*throttle_avg]}
- {platform: copy, name: "Balance Power", source_id: balance_power, filters: [*throttle_avg]}
- {platform: copy, name: "CT01 Power: Subpanel Black", source_id: cir1, filters: [*throttle_avg]}
- {platform: copy, name: "CT02 Power: Subpanel Red", source_id: cir2, filters: [*throttle_avg]}
- {platform: copy, name: "CT03 Power: AC Master", source_id: cir3, filters: [*throttle_avg]}
- {platform: copy, name: "CT04 Power: AC Office", source_id: cir4, filters: [*throttle_avg]}
- {platform: copy, name: "CT05 Power: AC Upstairs", source_id: cir5, filters: [*throttle_avg]}
- {platform: copy, name: "CT06 Power: Oven", source_id: cir6, filters: [*throttle_avg]}
- {platform: copy, name: "CT07 Power: Dryer", source_id: cir7, filters: [*throttle_avg]}
- {platform: copy, name: "CT08 Power: Pool Red", source_id: cir8, filters: [*throttle_avg]}
- {platform: copy, name: "CT09 Power: Pool Black", source_id: cir9, filters: [*throttle_avg]}
- {platform: copy, name: "CT10 Power: Server", source_id: cir10, filters: [*throttle_avg]}
- {platform: copy, name: "CT11 Power: Ice Maker", source_id: cir11, filters: [*throttle_avg]}
- {platform: copy, name: "CT12 Power: Media Fridge", source_id: cir12, filters: [*throttle_avg]}
- {platform: copy, name: "CT13 Power: Garage GFI", source_id: cir13, filters: [*throttle_avg]}
- {platform: copy, name: "CT14 Power: Media 20a", source_id: cir14, filters: [*throttle_avg]}

# ---- Daily energy sensors (integrate raw power, throttle HA updates) ----
- {!!merge <<: *daily_energy, name: "Total Daily Energy", power_id: total_power}
- {!!merge <<: *daily_energy, name: "Balance Daily Energy", power_id: balance_power}
- {!!merge <<: *daily_energy, name: "CT01 Usage: Subpanel Black", power_id: cir1}
- {!!merge <<: *daily_energy, name: "CT02 Usage: Subpanel Red", power_id: cir2}
- {!!merge <<: *daily_energy, name: "CT03 Usage: AC Master", power_id: cir3}
- {!!merge <<: *daily_energy, name: "CT04 Usage: AC Office", power_id: cir4}
- {!!merge <<: *daily_energy, name: "CT05 Usage: AC Upstairs", power_id: cir5}
- {!!merge <<: *daily_energy, name: "CT06 Usage: Oven", power_id: cir6}
- {!!merge <<: *daily_energy, name: "CT07 Usage: Dryer", power_id: cir7}
- {!!merge <<: *daily_energy, name: "CT08 Usage: Pool Red", power_id: cir8}
- {!!merge <<: *daily_energy, name: "CT09 Usage: Pool Black", power_id: cir9}
- {!!merge <<: *daily_energy, name: "CT10 Usage: Server", power_id: cir10}
- {!!merge <<: *daily_energy, name: "CT11 Usage: Ice Maker", power_id: cir11}
- {!!merge <<: *daily_energy, name: "CT12 Usage: Media Fridge", power_id: cir12}
- {!!merge <<: *daily_energy, name: "CT13 Usage: Garage GFI", power_id: cir13}
- {!!merge <<: *daily_energy, name: "CT14 Usage: Media 20a", power_id: cir14}
