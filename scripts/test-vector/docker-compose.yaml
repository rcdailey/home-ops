---
services:
  vector:
    image: timberio/vector:0.54.0-alpine
    container_name: vector-test
    stdin_open: true
    tty: false
    environment:
      VECTOR_NODE_NAME: test-node
    volumes:
    # Production transforms (read-only)
    - ../../kubernetes/apps/observability/victoria-logs-single/vector/vector-transforms.yaml:/etc/vector/vector-transforms.yaml:ro
    # Production VRL files bind-mounted flat into /etc/vector/ to match the
    # projected-volume layout used in the cluster (chart mounts both
    # existingConfigMaps into /etc/vector/ as a merged directory).
    - ../../kubernetes/apps/observability/victoria-logs-single/vrl/parse-default.vrl:/etc/vector/parse-default.vrl:ro
    - ../../kubernetes/apps/observability/victoria-logs-single/vrl/parse-ceph.vrl:/etc/vector/parse-ceph.vrl:ro
    - ../../kubernetes/apps/observability/victoria-logs-single/vrl/parse-talos.vrl:/etc/vector/parse-talos.vrl:ro
    # Test-specific source and sink (stdin/console) for local pipeline testing
    - ./vector-sources.yaml:/etc/vector/vector-sources.yaml:ro
    - ./vector-sinks.yaml:/etc/vector/vector-sinks.yaml:ro
    # Data directory (read-write)
    - ./vector-data:/vector-data-dir
    # Use explicit --config per file to avoid loading the image's default
    # /etc/vector/vector.yaml (which ships with demo_logs source).
    command:
    - --config
    - /etc/vector/vector-sources.yaml
    - --config
    - /etc/vector/vector-transforms.yaml
    - --config
    - /etc/vector/vector-sinks.yaml
